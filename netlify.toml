# ============================================================
# Netlify configuration for Next.js ChatApp
# Uses @netlify/plugin-nextjs for full Next.js support
# ============================================================
[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# API routes are handled automatically by the Next.js plugin
